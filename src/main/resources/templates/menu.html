<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forno a Legna - Pizzeria Napoletana</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <!-- Header -->
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="logo">
                    <h1>Forno a Legna</h1>
                </div>
                <ul class="nav-menu">
                    <li><a href="/">Home</a></li>
                    <li><a href="/menu" class="active">Menu</a></li>
                    <li><a href="/#chi-siamo">Chi Siamo</a></li>
                    <li><a href="/#contatti">Contatti</a></li>
                    
                    <!-- Mostra Login solo se NON autenticato -->
                    <li th:if="${!isAuthenticated}">
                        <a href="/login">Login</a>
                    </li>
                    
                    <!-- Mostra Admin solo se autenticato come ADMIN -->
                    <li th:if="${isAuthenticated and isAdmin}">
                        <a href="/admin/pizze">Admin</a>
                    </li>
                    
                    <!-- Mostra username e Logout se autenticato -->
                    <li th:if="${isAuthenticated}">
                        <span style="color: white; margin-right: 10px;">
                            Benvenuto, <span th:text="${username}"></span>
                        </span>
                    </li>
                    <li th:if="${isAuthenticated}">
                        <form th:action="@{/logout}" method="post" style="display: inline;">
                            <button type="submit" style="background: none; border: none; color: white; cursor: pointer; font-size: 16px;">
                                Logout
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

    <div class="pizza-grid">
    <div th:each="pizza : ${pizze}" class="pizza-card">
        <h3 th:text="${pizza.nome}">Nome Pizza</h3>
        <p th:text="${pizza.descrizione}">Descrizione</p>
        <span class="prezzo" th:text="'€ ' + ${pizza.prezzo}">€ 0.00</span>
    </div>
</div>
