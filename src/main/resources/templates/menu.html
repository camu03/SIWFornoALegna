<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Forno a Legna</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    
    <!-- Header -->
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="logo">
                    <h1>Forno a Legna - Menu</h1>
                </div>
                <ul class="nav-menu">
                    <li><a href="/">Home</a></li>
                    <li><a href="/menu" class="active">Menu</a></li>
                    <li th:if="${isAuthenticated}">
                        <a href="/carrello">Carrello</a>
                    </li>
                   
                    
                    <!-- Mostra Login solo se NON autenticato -->
                    <li th:if="${!isAuthenticated}">
                        <a href="/login">Login</a>
                    </li>
                    
                    <!-- Mostra Admin solo se autenticato come ADMIN -->
                    <li th:if="${isAuthenticated and isAdmin}">
                        <a href="/admin">Admin</a>
                    </li>
                    
                    <!-- Mostra username e Logout se autenticato -->
                    <li th:if="${isAuthenticated}">
                        <span style="color: white; margin-right: 10px;">
                            Benvenuto, <span th:text="${username}"></span>
                        </span>
                    </li>
                    <li th:if="${isAuthenticated}">
                        <form th:action="@{/logout}" method="post" style="display: inline;">
                            <button type="submit" style="background: none; border: none; color: white; cursor: pointer; font-size: 16px;">
                                Logout
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

    <!-- CSRF token per i form React -->
    <input type="hidden" id="csrf-token" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <input type="hidden" id="csrf-param" th:value="${_csrf.parameterName}"/>

    <!-- Menu React -->
    <div id="menu-react-root"></div>

    <script crossorigin="anonymous" src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin="anonymous" src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script th:src="@{/js/menu-react.js}"></script>

    
    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; 2025 Forno a Legna - Tutti i diritti riservati</p>
        </div>
    </footer>
</body>
</html>
