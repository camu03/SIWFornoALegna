<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Errore - Forno a Legna</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    
    <section class="section" style="text-align: center; padding: 80px 20px;">
        <div class="container">
            <h1 style="font-size: 6rem; color: #c41e3a; margin: 0;" th:text="${status}">404</h1>
            <h2 th:text="${error}">Pagina non trovata</h2>
            <p style="color: #666; margin: 20px 0;" th:text="${message}">Si è verificato un errore.</p>
            <a href="/" class="btn-primary" style="display: inline-block; margin-top: 20px;">
                Torna alla Home
            </a>
        </div>
    </section>

</body>
</html>
