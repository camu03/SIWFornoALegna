<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Forno a Legna</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <!-- Header -->
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="logo">
                    <h1>Forno a Legna - Admin</h1>
                </div>
                <ul class="nav-menu">
                    <li><a href="/">Home</a></li>
                    <li><a href="/admin" class="active">Dashboard</a></li>
                    <li><form th:action="@{/logout}" method="post" style="display: inline;">
                            <button type="submit" style="background: none; border: none; color: white; cursor: pointer; font-size: 16px;">
                                Logout
                            </button>
                        </form></li>
                </ul>
            </div>
        </nav>
    </header>

    <!-- Dashboard Section -->
    <section class="section">
        <div class="container">
            <h2 class="section-title">Pannello Amministratore</h2>

            <div id="admin-dashboard-root"
                 th:attr="data-pizze-count=${totalePizze}, data-bibite-count=${totaleBibite}, data-fritti-count=${totaleFritti}, data-ingredienti-count=${totaleIngredienti}">
                <p style="text-align: center; color: #666;">Caricamento dashboard in corso...</p>
            </div>
        </div>
    </section>

    <script crossorigin="anonymous" src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin="anonymous" src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script th:src="@{/js/admin-dashboard-react.js}"></script>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; 2025 Forno a Legna - Tutti i diritti riservati</p>
        </div>
    </footer>
</body>
</html>
