<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Pizze - Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <!-- Header -->
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="logo">
                    <h1>Forno a Legna - Admin</h1>
                </div>
                <ul class="nav-menu">
                    <li><a href="/">Home</a></li>
                    <li><a href="/admin">Dashboard</a></li>
                    <li><a href="/admin/pizze" class="active">Gestisci Pizze</a></li>
                    <li><a href="/logout">Logout</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <!-- Gestione Pizze Section -->
    <section class="section">
        <div class="container">
            <h2 class="section-title">Gestione Pizze</h2>
            
            <!-- Form Aggiungi Pizza -->
            <div class="admin-form-container">
                <h3>Aggiungi Nuova Pizza</h3>
                <form th:action="@{/admin/pizze/add}" method="post" th:object="${pizza}" class="admin-form">
                    <div class="form-group">
                        <label for="nome">Nome Pizza</label>
                        <input type="text" id="nome" th:field="*{nome}" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="descrizione">Descrizione</label>
                        <textarea id="descrizione" th:field="*{descrizione}" rows="3" required></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="prezzo">Prezzo (€)</label>
                        <input type="number" id="prezzo" th:field="*{prezzo}" step="0.01" required>
                    </div>
                    
                    <button type="submit" class="btn-primary">Aggiungi Pizza</button>
                </form>
            </div>
            
            <!-- Lista Pizze -->
            <div class="admin-list-container">
                <h3>Pizze nel Menu</h3>
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Descrizione</th>
                            <th>Prezzo</th>
                            <th>Azioni</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="pizza : ${pizze}">
                            <td th:text="${pizza.id}">1</td>
                            <td th:text="${pizza.nome}">Margherita</td>
                            <td th:text="${pizza.descrizione}">Descrizione</td>
                            <td th:text="'€ ' + ${pizza.prezzo}">€ 6.00</td>
                            <td>
                                <a th:href="@{/admin/pizze/delete/{id}(id=${pizza.id})}" 
                                   class="btn-delete"
                                   onclick="return confirm('Sei sicuro di voler eliminare questa pizza?')">
                                   Elimina
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; 2025 Forno a Legna - Tutti i diritti riservati</p>
        </div>
    </footer>
</body>
</html>
